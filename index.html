<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GigShield Pro</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  background: radial-gradient(circle at top, #0f172a, #020617);
  font-family: 'Inter', sans-serif;
}

.glass {
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(30px);
  border: 1px solid rgba(255,255,255,0.08);
}

.card:hover {
  transform: translateY(-6px);
  transition: 0.3s;
}

.toast {
  position: fixed;
  top: 20px;
  right: 20px;
  background: #020617;
  padding: 16px;
  border-radius: 12px;
  border: 1px solid #3b82f6;
  display:none;
}
</style>
</head>

<body class="text-white p-6">

<div class="max-w-6xl mx-auto space-y-8">

<!-- REGISTRATION -->
<div id="registerBox" class="glass p-6 rounded-2xl">
<h2 class="text-xl mb-4">Register Worker</h2>
<input id="nameInput" placeholder="Name" class="p-2 w-full mb-2 text-black">
<input id="cityInput" placeholder="City" class="p-2 w-full mb-2 text-black">
<button onclick="register()" class="bg-blue-500 px-4 py-2 rounded">Register</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden space-y-8">

<div class="flex justify-between">
<h1 class="text-3xl text-blue-400">🛡️ GigShield</h1>
<p id="clock"></p>
</div>

<!-- CARDS -->
<div class="grid md:grid-cols-3 gap-6">

<div class="glass card p-6 rounded-2xl">
<p>Worker</p>
<h2 id="name"></h2>
<p id="location"></p>
</div>

<div class="glass card p-6 rounded-2xl">
<p>Premium</p>
<h2 id="price" class="text-blue-400 text-3xl"></h2>
</div>

<div class="glass card p-6 rounded-2xl">
<p>Risk</p>
<h2 id="risk"></h2>
</div>

</div>

<!-- POLICY -->
<div class="glass p-6 rounded-2xl">
<h2>Policy</h2>
<p>Status: Active ✅</p>
<p>Coverage: ₹50,000</p>
</div>

<!-- LIVE -->
<div class="glass p-6 rounded-2xl">
<h2>Live Conditions</h2>
<p id="weather"></p>
<p id="aqi"></p>
</div>

<!-- CHART -->
<div class="glass p-6 rounded-2xl">
<canvas id="chart"></canvas>
</div>

</div>

</div>

<div id="toast" class="toast">💸 ₹1000 credited</div>

<script>

// REGISTER
function register(){
  const name = document.getElementById("nameInput").value;
  const city = document.getElementById("cityInput").value;

  localStorage.setItem("userData", JSON.stringify({
    name, city, state:"India"
  }));

  location.reload();
}

// LOAD USER
const data = JSON.parse(localStorage.getItem("userData"));

if(data){
  document.getElementById("registerBox").style.display="none";
  document.getElementById("dashboard").classList.remove("hidden");

  document.getElementById("name").innerText = data.name;
  document.getElementById("location").innerText = data.city;
}

// CLOCK
setInterval(()=>{
  if(document.getElementById("clock"))
    document.getElementById("clock").innerText = new Date().toLocaleTimeString();
},1000);

// AI RISK ENGINE
function calculateRisk(weather, aqi, hours, time){
  let score = 0;

  if(weather.includes("rain")) score += 40; // trigger 1
  if(aqi > 100) score += 30; // trigger 2
  if(hours > 8) score += 20; // trigger 3
  if(time > 22) score += 10; // trigger 4
  if(weather.includes("clear")) score += 5;

  return score;
}

function getAQI(){
  return Math.floor(Math.random()*200);
}

// WEATHER API
async function getWeather(city){
  try{
    const API_KEY = process.env.API_KEY;
    const res = await fetch(
      `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${key}`
    );
    const data = await res.json();
    const weather = data.weather[0].main.toLowerCase();
    document.getElementById("weather").innerText="Weather: "+weather;
    return weather;
  }catch{
    return "clear";
  }
}

// MAIN
async function run(){
  if(!data) return;

  let weather = await getWeather(data.city);
  let aqi = getAQI();
  let hours = Math.floor(Math.random()*10);
  let time = new Date().getHours();

  document.getElementById("aqi").innerText="AQI: "+aqi;

  let score = calculateRisk(weather, aqi, hours, time);

  let risk = score>60?"High 🔴":score>30?"Medium 🟡":"Low 🟢";
  let price = Math.round(40 + score*0.6);

  document.getElementById("risk").innerText=risk;
  document.getElementById("price").innerText="₹"+price;

  // CLAIM TRIGGER
  if(score>60){
    document.getElementById("toast").style.display="block";
    setTimeout(()=>document.getElementById("toast").style.display="none",3000);
  }
}

run();

// CHART
new Chart(document.getElementById('chart'),{
  type:'line',
  data:{
    labels:['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
    datasets:[
      {label:'Earnings',data:[500,700,600,800,900,750,1000],borderColor:'#3b82f6'},
      {label:'Claims',data:[0,0,500,0,0,300,0],borderColor:'#f59e0b'}
    ]
  }
});

</script>

</body>
</html>
